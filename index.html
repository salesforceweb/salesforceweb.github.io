<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDOC.AI - Lead Form</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .field { position: relative; margin-top: 18px; }

    .field input, .field textarea {
      width: 100%;
      padding: 18px 14px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      outline: none;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 16px;
      color: #cbd5e1;
      font-size: 13px;
      pointer-events: none;
      transition: all .25s ease;
      padding: 0 4px;
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label,
    .field textarea:focus + label,
    .field textarea:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 11px;
      color: #60a5fa;
      background: rgba(0,0,0,0.7);
      border-radius: 6px;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-black">

<div class="w-full max-w-md p-6 bg-white/10 backdrop-blur-xl rounded-3xl border border-white/20">

<form id="leadForm" action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8" method="POST">

  <!-- 🔴 REQUIRED SALESFORCE HIDDEN FIELDS -->
  <input type="hidden" name="oid" value="YOUR_ORG_ID_HERE">
  <input type="hidden" name="retURL" value="thankyou.html">

  <!-- 🔥 THIS IS IMPORTANT -->
  <input type="hidden" id="serviceField" name="Service_Interested__c">

  <div class="field">
    <input type="text" name="last_name" required placeholder=" ">
    <label>Full Name *</label>
  </div>

  <div class="field">
    <input type="email" name="email" required placeholder=" ">
    <label>Email *</label>
  </div>

  <div class="field">
    <input type="text" name="company" required placeholder=" ">
    <label>Company *</label>
  </div>

  <div class="field">
    <input type="tel" name="phone" required placeholder=" " pattern="[0-9]{10}" maxlength="10">
    <label>Phone *</label>
  </div>

  <!-- Dropdown -->
  <div class="mt-4">
    <label class="text-xs text-gray-300">Service Interested</label>

    <div class="relative mt-2">
      <button type="button" id="dropdownBtn"
        class="w-full px-4 py-3 rounded-xl bg-gray-800 text-white flex justify-between">
        <span id="selectedText">Select Service</span>
        <span>▾</span>
      </button>

      <div id="dropdownMenu"
        class="hidden absolute w-full mt-2 bg-gray-900 rounded-xl">

        <div class="option px-4 py-3 hover:bg-gray-700 cursor-pointer">Salesforce CRM</div>
        <div class="option px-4 py-3 hover:bg-gray-700 cursor-pointer">AI Solutions</div>
        <div class="option px-4 py-3 hover:bg-gray-700 cursor-pointer">Automation</div>
        <div class="option px-4 py-3 hover:bg-gray-700 cursor-pointer">Other</div>

      </div>
    </div>
  </div>

  <div class="field">
    <textarea name="description" rows="3" placeholder=" "></textarea>
    <label>Message</label>
  </div>

  <button class="w-full mt-4 py-3 bg-blue-600 rounded-xl text-white">
    Submit
  </button>

</form>
</div>

<script>
const btn = document.getElementById('dropdownBtn');
const menu = document.getElementById('dropdownMenu');
const selectedText = document.getElementById('selectedText');
const serviceField = document.getElementById('serviceField');

// Toggle dropdown
btn.addEventListener('click', (e) => {
  e.stopPropagation();
  menu.classList.toggle('hidden');
});

// Select option
document.querySelectorAll('.option').forEach(opt => {
  opt.addEventListener('click', () => {
    const value = opt.textContent.trim();

    selectedText.textContent = value;
    serviceField.value = value; // 🔥 store in hidden field

    menu.classList.add('hidden');
  });
});

// Close dropdown
document.addEventListener('click', () => {
  menu.classList.add('hidden');
});
</script>

</body>
</html>
