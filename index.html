<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDOC.AI - Lead Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Floating label */
    .field { position: relative; }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      outline: none;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .field label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #cbd5e1;
      font-size: 14px;
      pointer-events: none;
      transition: all .2s ease;
      background: transparent;
      padding: 0 4px;
    }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label,
    .field textarea:focus + label,
    .field textarea:not(:placeholder-shown) + label,
    .field select:focus + label,
    .field select:not([value=""]) + label {
      top: -8px;
      font-size: 11px;
      color: #93c5fd;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
    }

    /* AI typing effect */
    .typing::after {
      content: '|';
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body class="h-screen w-full bg-cover bg-center flex items-center justify-center" style="background-image: url('https://salesforceweb.github.io/AISalesforceBackground');">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- Form Container -->
  <div class="relative z-10 w-full max-w-lg p-8 bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20">
    
    <!-- Header with Logo -->
    <div class="flex items-center justify-center gap-3 mb-6">
      <img src="https://salesforceweb.github.io/companyLogo.png" alt="EDOC Logo" class="w-12 h-12 object-contain rounded-lg shadow-md bg-white/20 p-1">
      <div>
        <h1 class="text-2xl font-bold text-white">EDOC.AI</h1>
        <p class="text-gray-300 text-xs">AI • Salesforce • Automation</p>
      </div>
    </div>

    <!-- AI Live Text -->
    <div class="text-center text-blue-300 text-sm mb-4">
      <span id="aiText" class="typing"></span>
    </div>

    <!-- Form -->
    <form action="#" method="POST" class="space-y-4">

      <div class="field">
        <input type="text" required placeholder=" ">
        <label>Full Name <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="email" required placeholder=" ">
        <label>Email <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="text" required placeholder=" ">
        <label>Company <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="tel" required placeholder=" ">
        <label>Phone <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <select value="">
          <option value="" disabled selected></option>
          <option>Salesforce CRM</option>
          <option>AI Solutions</option>
          <option>Automation</option>
          <option>Other</option>
        </select>
        <label>Service Interested</label>
      </div>

      <div class="field">
        <textarea rows="3" placeholder=" "></textarea>
        <label>Message</label>
      </div>

      <!-- Button -->
      <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:scale-105 transition duration-300 shadow-lg">
        Submit
      </button>

    </form>

  </div>

  <script>
    // AI typing effect
    const text = "AI Assistant is ready to help you...";
    let i = 0;
    function typeEffect() {
      if (i < text.length) {
        document.getElementById("aiText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
      }
    }
    typeEffect();
  </script>

</body>
</html>
