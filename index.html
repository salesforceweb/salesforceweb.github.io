<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDOC.AI - Lead Form</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .field { position: relative; margin-top: 18px; }

    .field input, .field textarea {
      width: 100%;
      padding: 18px 14px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      outline: none;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 16px;
      color: #cbd5e1;
      font-size: 13px;
      pointer-events: none;
      transition: all .25s ease;
      padding: 0 4px;
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label,
    .field textarea:focus + label,
    .field textarea:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 11px;
      color: #60a5fa;
      background: rgba(0,0,0,0.7);
      border-radius: 6px;
    }

    .typing::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="min-h-screen w-full bg-cover bg-center flex items-center justify-center p-4"
style="background-image: url('https://salesforceweb.github.io/AISalesforceBackground');">

  <div class="absolute inset-0 bg-black/70"></div>

  <div class="relative z-10 w-full max-w-md sm:max-w-lg p-6 sm:p-8 bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20 fade-in">
    
    <!-- Header -->
    <div class="flex items-center justify-center gap-3 mb-6">
      <img src="https://salesforceweb.github.io/companyLogo.png" class="h-10 w-auto">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white">EDOC.AI</h1>
        <p class="text-gray-300 text-xs">AI • Salesforce • Automation</p>
      </div>
    </div>

    <!-- AI Text -->
    <div class="text-center text-blue-300 text-sm mb-4">
      <span id="aiText" class="typing"></span>
    </div>

    <form id="leadForm"
      action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8"
      method="POST"
      class="space-y-3 sm:space-y-4">

      <input type="hidden" name="oid" value="00Dg5000008Q5ic">
      <input type="hidden" name="retURL" value="https://salesforceweb.github.io/thankyou.html">

        <input type="hidden" name="debug" value="1">
        <input type="hidden" name="debugEmail" value="diwakar4job@gmail.com">

      <!-- Salesforce Field -->
      <input type="hidden" id="serviceField" name="Service_Interested__c">

      <div class="field">
        <input type="text" name="last_name" required placeholder=" ">
        <label>Full Name <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="email" name="email" required placeholder=" ">
        <label>Email <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="text" name="company" required placeholder=" ">
        <label>Company <span class="text-red-400">*</span></label>
      </div>

      <div class="field">
        <input type="tel" name="phone" required placeholder=" " pattern="[0-9]{10}" maxlength="10">
        <label>Phone <span class="text-red-400">*</span></label>
      </div>

      <!-- Dropdown -->
      <div class="mt-4">
        <label class="text-xs text-gray-300">Service Interested</label>

        <div class="relative mt-2">
          <button type="button" id="dropdownBtn"
            class="w-full text-left px-4 py-3 rounded-xl 
            bg-[rgba(255,255,255,0.15)] text-white 
            border border-[rgba(255,255,255,0.2)] 
            backdrop-blur-md flex justify-between items-center">
            <span id="selectedText">Select Service</span>
            <span>▾</span>
          </button>

          <!-- ✅ FIXED DROPDOWN -->
          <div id="dropdownMenu"
            class="hidden absolute w-full mt-2 rounded-xl 
            bg-[rgba(15,23,42,0.95)] 
            border border-[rgba(255,255,255,0.1)] 
            shadow-2xl overflow-hidden z-50">

            <div class="backdrop-blur-3xl">
              <div class="option px-4 py-3 hover:bg-white/20 cursor-pointer text-white">Salesforce CRM</div>
              <div class="option px-4 py-3 hover:bg-white/20 cursor-pointer text-white">AI Solutions</div>
              <div class="option px-4 py-3 hover:bg-white/20 cursor-pointer text-white">Automation</div>
              <div class="option px-4 py-3 hover:bg-white/20 cursor-pointer text-white">Other</div>
            </div>

          </div>
        </div>
      </div>

      <div class="field">
        <textarea name="description" rows="3" placeholder=" "></textarea>
        <label>Message</label>
      </div>

      <button
        class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:scale-105 active:scale-95 transition duration-300 shadow-lg">
        Submit
      </button>

    </form>

  </div>

  <script>
    const text = "AI Assistant is ready to help you...";
    let i = 0;
    function typeEffect() {
      if (i < text.length) {
        document.getElementById("aiText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 35);
      }
    }
    typeEffect();

    const btn = document.getElementById('dropdownBtn');
    const menu = document.getElementById('dropdownMenu');
    const selectedText = document.getElementById('selectedText');
    const serviceField = document.getElementById('serviceField');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.toggle('hidden');
    });

    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        const value = opt.textContent.trim();
        selectedText.textContent = value;
        serviceField.value = value;
        menu.classList.add('hidden');
      });
    });

    document.addEventListener('click', () => {
      menu.classList.add('hidden');
    });
  </script>
  <script>
document.getElementById("leadForm").addEventListener("submit", function(e) {

  console.log("🚀 Form Submit Triggered");

  try {
    const form = this;
    const data = new FormData(form);

    console.log("📦 Form Data:");
    for (let [key, value] of data.entries()) {
      console.log(key + ":", value);
    }

    const required = ["last_name", "email", "company", "phone"];
    required.forEach(field => {
      const val = form.querySelector(`[name="${field}"]`)?.value;
      if (!val) {
        console.error(`❌ Missing field: ${field}`);
      }
    });

    const service = document.getElementById("serviceField").value;
    if (!service) {
      console.warn("⚠️ Service not selected");
    } else {
      console.log("✅ Service Selected:", service);
    }

    console.log("✅ Sending data to Salesforce...");

  } catch (err) {
    console.error("🔥 JS Error:", err);
  }

});
</script>

</body>
</html>
