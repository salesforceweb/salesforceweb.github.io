<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDOC.AI | Demo Form</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: url('https://salesforceweb.github.io/AISalesforceBackground') no-repeat center center/cover;
    height: 100vh;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(3px);
}

/* LEFT SIDE */
.left {
    flex: 1;
    color: white;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 42px;
    font-weight: bold;
    line-height: 1.2;
}

.highlight {
    background: #22c55e;
    padding: 4px 10px;
    border-radius: 4px;
    color: black;
}

.left p {
    margin-top: 20px;
    font-size: 16px;
    opacity: 0.9;
}

/* RIGHT FORM */
.right {
    width: 400px;
    background: #38b2ac; /* teal based on your logo */
    padding: 30px;
    display: flex;
    align-items: center;
}

/* FORM BOX */
.form-box {
    width: 100%;
}

.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    width: 100px;
}

.form-box h2 {
    color: white;
    margin-bottom: 15px;
    font-size: 18px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* CHECKBOX */
.checkbox {
    display: flex;
    align-items: start;
    font-size: 12px;
    color: white;
    margin: 10px 0;
}

.checkbox input {
    margin-right: 8px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #a3e635;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #84cc16;
}

/* MOBILE */
@media(max-width: 900px){
    .wrapper {
        flex-direction: column;
    }

    .left {
        padding: 30px;
        text-align: center;
    }

    .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT CONTENT -->
    <div class="left">
        <h1>
            Book a free live<br>
            demo tailored to <br>
            <span class="highlight">your</span> business needs
        </h1>

        <p>
            Experience how EDOC.AI can transform your business with intelligent document automation.
        </p>
    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <div class="form-box">

            <div class="logo">
                <img src="https://salesforceweb.github.io/companyLogo.png">
            </div>

            <h2>Get Started</h2>

            <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000008Q5ic" method="POST">

                <!-- Hidden Fields -->
                <input type="hidden" name="oid" value="00Dg5000008Q5ic">
                <input type="hidden" name="retURL" value="https://salesforceweb.github.io/thankyou">

                <!-- Fields -->
                <input type="email" name="email" placeholder="Work Email *" required>
                <input type="text" name="first_name" placeholder="First Name">
                <input type="text" name="last_name" placeholder="Last Name *" required>
                <input type="text" name="company" placeholder="Company Name *" required>

                <select>
                    <option># of Employees</option>
                    <option>1-10</option>
                    <option>11-50</option>
                    <option>50+</option>
                </select>

                <input type="text" name="phone" placeholder="Phone (Optional)">

                <select name="country_code">
                    <option value="">Country</option>
                    <option value="IN">India</option>
                    <option value="AE">UAE</option>
                    <option value="US">USA</option>
                </select>

                <div class="checkbox">
                    <input type="checkbox" required>
                    <label>I agree to receive information and accept privacy policy</label>
                </div>

                <button type="submit">Submit</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
