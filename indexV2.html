<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDOC.AI | Lead Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://raw.githubusercontent.com/salesforceweb/salesforceweb.github.io/main/image%20(5).png');
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    color: #1e3a8a;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #1e3a8a;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0f172a;
}
</style>
</head>

<body>

<div class="container">
    <h2>EDOC.AI Lead Form</h2>

    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000008Q5ic" method="POST">

        <input type="hidden" name="oid" value="00Dg5000008Q5ic">
        <input type="hidden" name="retURL" value="https://yourusername.github.io/your-repo/thankyou.html">
        <input type="hidden" name="lead_source" value="QR Campaign">

        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="company" placeholder="Company">
        <input type="text" name="city" placeholder="City">

        <select name="country_code">
            <option value="">Country</option>
            <option value="IN">India</option>
            <option value="AE">UAE</option>
            <option value="US">USA</option>
        </select>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
