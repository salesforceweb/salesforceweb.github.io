<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - EDOC.AI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glow {
      box-shadow: 0 0 40px rgba(96,165,250,0.4);
    }

    .typing::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-cover bg-center p-6"
style="background-image: url('https://salesforceweb.github.io/AISalesforceBackground');">

  <div class="absolute inset-0 bg-black/70"></div>

  <div class="relative z-10 w-full max-w-lg text-center p-8 rounded-3xl 
              bg-white/10 backdrop-blur-2xl border border-white/20 fade-in glow">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img src="https://salesforceweb.github.io/companyLogo.png" class="h-12">
    </div>

    <!-- Success -->
    <div class="text-green-400 text-5xl mb-4">✔</div>

    <h1 class="text-3xl font-bold text-white mb-2">Thank You!</h1>

    <p id="aiText" class="text-blue-300 text-sm mb-6"></p>

    <!-- Info -->
    <div class="bg-white/10 border border-white/20 rounded-2xl p-5 text-left mb-6">
      <p class="text-white text-sm mb-2">✔ Your request has been successfully submitted</p>
      <p class="text-gray-300 text-xs">Our AI + Salesforce team will connect with you shortly.</p>
    </div>

    <!-- SUPPORT SECTION -->
    <div class="bg-white/10 border border-white/20 rounded-2xl p-5 text-left mb-6">
      <p class="text-white font-semibold mb-2">Support Contact</p>

      <p class="text-gray-300 text-sm">
        📧 Email: <span class="text-blue-300">support@edoc.ai</span>
      </p>

      <p class="text-gray-300 text-sm mt-1">
        📞 Phone: <span class="text-blue-300">+91 0000000000</span>
      </p>
    </div>

    <!-- CTA -->
    <div class="flex justify-center">
      <a href="https://www.google.com"
         class="px-6 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:scale-105 transition">
        Done
      </a>
    </div>

    <!-- Footer -->
    <p class="text-gray-400 text-xs mt-6">
      Powered by EDOC.AI • Salesforce Automation
    </p>

  </div>

<script>
  const text = "We’ve received your request. Our team will contact you soon...";
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      document.getElementById("aiText").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 35);
    }
  }

  typeEffect();
</script>

</body>
</html>
